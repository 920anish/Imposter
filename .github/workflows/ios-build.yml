name: iOS stuff

on:
  push:
    branches: [ main, master ] 
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build-ios:
    name: Build iOS Targets
    runs-on: macos-latest 
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build iOS Targets
        run: |
         
          ./gradlew :sharedUI:compileKotlinIosArm64 :sharedUI:compileKotlinIosSimulatorArm64 --stacktrace

      - name: Upload Build Reports (If Failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: "**/build/reports"
